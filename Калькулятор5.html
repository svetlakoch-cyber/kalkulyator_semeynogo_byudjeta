<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор бюджета семьи</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --фон: #174B4C;
    --плашка: #1F5F61;
    --акцент: #E89528;
    --доход: #6EDC8C;
    --расход: #FF8A4C;
    --текст: #ffffff;
}

body {
    font-family: 'Segoe UI', sans-serif;
    font-size: 15px;
    background: var(--фон);
    color: var(--текст);
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 980px;
    margin: auto;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    gap: 15px;
    flex-wrap: wrap;
}

.app-title {
    margin: 0;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 0.2px;
}

.topbar-left {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 260px;
}

.topbar-right {
    flex: 1;
    display: flex;
    justify-content: flex-end;
}

.kpis {
    display: grid;
    grid-template-columns: repeat(3, minmax(160px, 1fr));
    gap: 15px;
    width: min(720px, 100%);
}

.kpi-title {
    font-weight: 700;
    opacity: 0.95;
}

.filter {
    background: var(--акцент);
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 350px;
    gap: 16px;
}

.card {
    background: var(--плашка);
    padding: 16px;
    border-radius: 14px;
}

.history-table {
    width: 100%;
    border-collapse: collapse;
}

.history-table td {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.history-actions {
    width: 34px;
    text-align: right;
}

button.icon-x {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.10);
    color: #ffffff;
    cursor: pointer;
    font-size: 18px;
    line-height: 28px;
    padding: 0;
}

button.icon-x:hover {
    background: rgba(255,255,255,0.16);
}


.stat-val {
    font-size: 1.5rem;
    font-weight: bold;
}

/* Блоки добавления доходов/расходов */
.block-title {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 800;
}

.block-hint {
    margin: 6px 0 14px;
    font-size: 0.9rem;
    opacity: 0.75;
}

.add-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
}

.add-row select,
.add-row input {
    width: auto;
    margin-top: 0;
    flex: 1 1 180px;
    min-width: 160px;
}

.amount-wrap {
    position: relative;
    flex: 1 1 160px;
    min-width: 150px;
}

.amount-wrap input {
    width: 100%;
    padding-right: 42px;
}

.amount-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border-radius: 999px;
    background: rgba(255,255,255,0.14);
    display: grid;
    place-items: center;
    font-size: 0.85rem;
    opacity: 0.9;
    pointer-events: none;
}

button.primary {
    padding: 11px 18px;
    border: none;
    border-radius: 12px;
    background: #E89528;
    color: white;
    font-weight: 800;
    cursor: pointer;
    flex: 0 0 auto;
    white-space: nowrap;
}

button.primary:hover {
    filter: brightness(1.05);
}

.rows {
    margin-top: 10px;
    display: grid;
    gap: 10px;
}

.row-item {
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}

.row-label {
    font-weight: 700;
    opacity: 0.95;
}

.row-value {
    font-weight: 900;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* Свернутый select: белый. При раскрытии/фокусе: серый */
select:focus,
select.is-open {
    color: #A9A9A9;
}

/* Пункты выпадающего списка (Windows/Chrome рисует их отдельно) */
select option,
select optgroup {
    background: var(--плашка);
    color: #A9A9A9;
}

button.save {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    border: none;
    background: var(--акцент);
    border-radius: 12px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="topbar">
        <div class="topbar-left">
            <h2 class="app-title">Калькулятор семейного бюджета</h2>
            <select id="filter" class="filter" onchange="render()"></select>
        </div>

        <div class="topbar-right">
            <div class="kpis">
                <div class="card">
                    <div class="kpi-title">Доходы</div>
                    <div id="inc" class="stat-val" style="color: var(--доход)">0 ₽</div>
                </div>

                <div class="card">
                    <div class="kpi-title">Расходы</div>
                    <div id="exp" class="stat-val" style="color: var(--расход)">0 ₽</div>
                </div>

                <div class="card">
                    <div class="kpi-title">Баланс</div>
                    <div id="bal" class="stat-val">0 ₽</div>
                </div>
            </div>
        </div>
    </div>

    <div class="grid">

        <div>
            <div class="card">
                <h3>История</h3>
                <table class="history-table">
                    <tbody id="list"></tbody>
                </table>
            </div>
        </div>

        <div>
            <div class="card">
                <h3 class="block-title">Доходы</h3>
                <div class="block-hint">Название, категория, сумма.</div>

                <div class="add-row">
                    <select id="income_name"></select>

                    <select id="income_kind">
                        <option value="active" selected>Активный доход</option>
                        <option value="passive">Пассивный доход</option>
                        <option value="oneoff">Разовые поступления</option>
                    </select>

                    <div class="amount-wrap">
                        <input id="income_amt" type="number" placeholder="Сумма">
                        <div class="amount-icon">₽</div>
                    </div>

                    <button class="primary" onclick="addIncome()">Добавить</button>
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <h3 class="block-title">Расходы</h3>
                <div class="block-hint">Название, категория, сумма.</div>

                <div class="add-row">
                    <select id="expense_name"></select>

                    <select id="expense_kind">
                        <option value="required" selected>Обязательные расходы</option>
                        <option value="variable">Переменные расходы</option>
                        <option value="fun">Развлечения</option>
                    </select>

                    <div class="amount-wrap">
                        <input id="expense_amt" type="number" placeholder="Сумма">
                        <div class="amount-icon">₽</div>
                    </div>

                    <button class="primary" onclick="addExpense()">Добавить</button>
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <h3 class="block-title">Доходы по категориям</h3>
                <div class="rows" id="incomeByKind">
                    <div class="row-item">
                        <div class="row-label">Активный доход</div>
                        <div class="row-value" id="inc_active">0 ₽</div>
                    </div>
                    <div class="row-item">
                        <div class="row-label">Пассивный доход</div>
                        <div class="row-value" id="inc_passive">0 ₽</div>
                    </div>
                    <div class="row-item">
                        <div class="row-label">Разовые поступления</div>
                        <div class="row-value" id="inc_oneoff">0 ₽</div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
let items = JSON.parse(localStorage.getItem('b')) || [];
let chart;

// 🔥 КАТЕГОРИИ
const категории = {
    income: [
        "Оплата за работу куратором",
        "Оплата за гайды",
        "Смм",
        "Алименты",
        "Подарки",
        "Продажа вещей",
        "Проценты",
        "Кэшбэк",
        "Прочее",
        "Пассивный доход"
    ],
    expense: [
        "Коммунальные платежи",
        "Налоги",
        "Продукты",
        "Бытовая химия, гигиена и проч",
        "Связь и интернет",
        "Школа",
        "Одежда",
        "Обувь",
        "Аксессуары",
        "Транспорт",
        "Кот",
        "Кафе и проч",
        "Развлечения",
        "Путешествия",
        "Подписки",
        "Аптеки",
        "Врачи, анализы и проч",
        "Подарки",
        "Прочее",
        "Вклады"
    ]
};

function setOptions(selectEl, options) {
    selectEl.innerHTML = options.map(v => `<option value="${v}">${v}</option>`).join('');
}

function initSelectOpenColors() {
    document.querySelectorAll('select').forEach(sel => {
        sel.addEventListener('mousedown', () => sel.classList.add('is-open'));
        sel.addEventListener('focus', () => sel.classList.add('is-open'));
        sel.addEventListener('blur', () => sel.classList.remove('is-open'));
        sel.addEventListener('change', () => sel.classList.remove('is-open'));
    });
}

function initAddBlocks() {
    setOptions(document.getElementById('income_name'), категории.income);
    setOptions(document.getElementById('expense_name'), категории.expense);
}

function addItem(t, c, a, kind) {
    if (!c || !a) return;

    const d = new Date();

    items.push({
        id: Date.now(),
        t,
        c,
        a,
        kind,
        m: d.toLocaleString('ru-RU', { month: 'long' }),
        y: d.getFullYear(),
        f: d.toLocaleDateString('ru-RU')
    });

    localStorage.setItem('b', JSON.stringify(items));
    render();
}

function addIncome() {
    const c = document.getElementById('income_name').value;
    const a = +document.getElementById('income_amt').value;
    const kind = document.getElementById('income_kind').value;
    addItem('income', c, a, kind);
    document.getElementById('income_amt').value = '';
}

function addExpense() {
    const c = document.getElementById('expense_name').value;
    const a = +document.getElementById('expense_amt').value;
    const kind = document.getElementById('expense_kind').value;
    addItem('expense', c, a, kind);
    document.getElementById('expense_amt').value = '';
}

function removeItem(id) {
    items = items.filter(x => x.id !== id);
    localStorage.setItem('b', JSON.stringify(items));
    render();
}

function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';

    let inc = 0;
    let exp = 0;
    let data = {};
    let incByKind = { active: 0, passive: 0, oneoff: 0 };

    items.slice().reverse().forEach(i => {
        if (i.t === 'income') {
            inc += i.a;
            const k = i.kind || 'active';
            if (incByKind[k] === undefined) incByKind[k] = 0;
            incByKind[k] += i.a;
        } else {
            exp += i.a;
            data[i.c] = (data[i.c] || 0) + i.a;
        }

        list.innerHTML += `
        <tr>
            <td>${i.c}</td>
            <td style="text-align:right">${i.t === 'income' ? '+' : '-'}${i.a} ₽</td>
            <td class="history-actions">
                <button class="icon-x" type="button" aria-label="Удалить" onclick="removeItem(${i.id})">×</button>
            </td>
        </tr>`;
    });

    incEl.innerText = inc + ' ₽';
    expEl.innerText = exp + ' ₽';

    const bal = inc - exp;
    balEl.innerText = bal + ' ₽';
    balEl.style.color = bal >= 0 ? 'var(--доход)' : 'var(--расход)';

    document.getElementById('inc_active').innerText = (incByKind.active || 0) + ' ₽';
    document.getElementById('inc_passive').innerText = (incByKind.passive || 0) + ' ₽';
    document.getElementById('inc_oneoff').innerText = (incByKind.oneoff || 0) + ' ₽';
}

const incEl = document.getElementById('inc');
const expEl = document.getElementById('exp');
const balEl = document.getElementById('bal');

// 🔥 запуск
initAddBlocks();
initSelectOpenColors();
render();
</script>

</body>
</html>
